name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Spring Boot application
        run: |
          cd springboot/app
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app ./springboot/app

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/springboot-app
            
      
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app ./angular-app

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app

  test-application:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run docker-compose
        run: docker compose up -d --build

      - name: Check running containers
        run: docker ps

      - name: Show logs
        run: docker compose logs
